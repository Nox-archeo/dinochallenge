<!DOCTYPE html>
<html>
<head>
    <title>Dino Challenge - Admin</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-card { background: #f0f0f0; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #4CAF50; color: white; }
        .premium { background: #fff3cd; }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <h1>🦕 Dino Challenge - Administration</h1>
    
    <div class="loading" id="loading">⏳ Chargement des utilisateurs...</div>
    
    <div id="content" style="display:none;">
        <div class="stats" id="stats"></div>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Username</th>
                    <th>Inscription</th>
                    <th>Statut</th>
                    <th>Parties</th>
                    <th>Meilleur Score</th>
                </tr>
            </thead>
            <tbody id="usersBody">
            </tbody>
        </table>
    </div>

    <script>
        const API_KEY = 'your_secret_admin_key'; // Changez ça !
        const API_URL = 'https://votre-app.onrender.com/admin/users';
        
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Afficher les stats
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <h3>👥 Total Utilisateurs</h3>
                        <p style="font-size: 24px; margin: 0;">${data.stats.total_users}</p>
                    </div>
                    <div class="stat-card">
                        <h3>💎 Premium</h3>
                        <p style="font-size: 24px; margin: 0;">${data.stats.premium_users}</p>
                    </div>
                `;
                
                // Afficher les utilisateurs
                const tbody = document.getElementById('usersBody');
                tbody.innerHTML = '';
                
                data.users.forEach(user => {
                    const row = document.createElement('tr');
                    if (user.premium) row.classList.add('premium');
                    
                    row.innerHTML = `
                        <td>${user.telegram_id}</td>
                        <td>${user.name}</td>
                        <td>@${user.username || 'N/A'}</td>
                        <td>${new Date(user.registration_date).toLocaleDateString()}</td>
                        <td>${user.premium ? '💎 Premium' : '🆓 Gratuit'}</td>
                        <td>${user.games}</td>
                        <td>${user.high_score}</td>
                    `;
                    tbody.appendChild(row);
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `❌ Erreur: ${error.message}`;
            }
        }
        
        // Charger automatiquement
        loadUsers();
        
        // Actualiser toutes les 30 secondes
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
